name: "Livvie Code Review"
description: "AI code review with multi-perspective reviewers, native suggestion blocks, and REQUEST_CHANGES support."
author: "4itworks"
branding:
  icon: "eye"
  color: "blue"

inputs:
  github-token:
    description: "GitHub token for posting PR reviews."
    required: true
    default: "${{ github.token }}"
  llm-api-key:
    description: "API key for your LLM provider. This is the only sensitive input — store it as a GitHub Secret."
    required: true
  llm-base-url:
    description: "Base URL for OpenAI-compatible API. Not sensitive — set as a plain string."
    required: false
    default: "https://openrouter.ai/api/v1"
  model:
    description: "Model name (e.g. z-ai/glm-5.2, anthropic/claude-sonnet-4). Not sensitive — set as a plain string."
    required: true
  review-instructions-file:
    description: "Repository file with extra review instructions."
    required: false
    default: ".github/code-reviewer.md"
  max-diff-size:
    description: "Maximum diff size in characters per file."
    required: false
    default: "50000"
  max-output-tokens:
    description: "Maximum tokens for the LLM response (includes reasoning tokens if reasoning is enabled)."
    required: false
    default: "16000"
  reasoning-effort:
    description: "Reasoning effort level for models that support it. Options: none, low, medium, high, max. Ignored by models that don't support reasoning."
    required: false
    default: "none"
  fallback-model:
    description: "Fallback model if the primary model fails after all retries. Set to empty to disable."
    required: false
    default: ""
  request-changes-on-high:
    description: "Post REQUEST_CHANGES when high-severity findings exist."
    required: false
    default: "true"
  always-request-changes:
    description: "(Deprecated) Use request-changes-on instead."
    required: false
    default: "false"
  max-comments:
    description: "Maximum inline comments to post."
    required: false
    default: "25"
  include-severities:
    description: "Comma-separated list of severities to include in the review. Options: low, medium, high."
    required: false
    default: "low,medium,high"
  include-confidences:
    description: "Comma-separated list of confidences to include in the review. Options: low, medium, high."
    required: false
    default: "low,medium,high"
  request-changes-on:
    description: "Comma-separated list of severities that trigger REQUEST_CHANGES. Use 'low,medium,high' to always request changes."
    required: false
    default: "high"
  ignore-patterns:
    description: "Comma-separated glob patterns for files to skip (e.g. *.g.dart,build/). Defaults to generated file patterns."
    required: false
    default: "build/**,dist/**,node_modules/**"
  max-batches:
    description: "Maximum number of file batches. Each batch is reviewed by every perspective, so total LLM calls = batches × perspectives. 0 = no limit."
    required: false
    default: "0"
  context-window:
    description: "Context window size in tokens for the model. Used for token budget calculation. Override if your model has a different context window."
    required: false
    default: "128000"
  cross-file-budget-max:
    description: "Maximum tokens to allocate for cross-file context in each batch."
    required: false
    default: "2000"
  cross-file-budget-ratio:
    description: "Percentage of context window (0-100) to allocate for cross-file context."
    required: false
    default: "5"
  safety-margin:
    description: "Additional tokens reserved for message wrappers and response overhead."
    required: false
    default: "500"
  circuit-breaker-threshold:
    description: "Consecutive failures before opening the circuit breaker for a model."
    required: false
    default: "3"
  agents-dir:
    description: "Directory containing agent .md files that define review perspectives. Each .md file = one reviewer. See README for file format and examples."
    required: false
    default: ".github/livvie_code_review_agents"
  verbose:
    description: "Log LLM reasoning traces and detailed debug info to the Actions log."
    required: false
    default: "false"

outputs:
  review-id:
    description: "The ID of the posted GitHub review."
  finding-count:
    description: "Total number of findings in the review."

runs:
  using: "node24"
  main: "dist/index.js"
